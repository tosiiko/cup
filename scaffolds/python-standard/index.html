<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CUP Python App</title>
  <link rel="stylesheet" href="/app.css" />
</head>
<body>
  <div class="boot-shell">
    <section class="boot-hero">
      <div class="boot-badge">CUP Python App</div>
      <h1>Start with a real app layout, not a one-file demo.</h1>
      <p>
        This starter keeps the moving pieces small: one Python server, file-based templates,
        a thin browser bridge, and policy-validated protocol views.
      </p>

      <div class="boot-grid">
        <div class="boot-card">
          <strong>Routes</strong>
          <span>Welcome + guide</span>
        </div>
        <div class="boot-card">
          <strong>Mutation</strong>
          <span>Saved display name</span>
        </div>
      </div>
    </section>

    <section class="boot-app">
      <div id="app">
        <div class="boot-loading">Loading CUP view…</div>
      </div>
    </section>
  </div>

  <script type="module" src="/app.js"></script>
</body>
</html>
